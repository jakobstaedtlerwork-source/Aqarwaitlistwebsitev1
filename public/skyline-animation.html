"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"4e7f6a0d-4a9c-4be0-8fa6-8d687c234846\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  html, body { margin: 0; background: #ffffff; }\n  @keyframes sd-pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"position: relative; width: 100%; max-width: 1536px; margin: 0 auto; background: #ffffff; user-select: none;\">\n  <div ref=\"{{ wrapRef }}\" style=\"position: relative; width: 100%; aspect-ratio: 1536 / 1024; overflow: hidden;\">\n    <img ref=\"{{ imgRef }}\" src=\"2dc1fd92-e680-424f-a6ba-bb480da0fbc5\" alt=\"Dubai skyline line drawing\" draggable=\"false\" style=\"position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; -webkit-mask-image: linear-gradient(to right, #000 0px, transparent 0px); mask-image: linear-gradient(to right, #000 0px, transparent 0px);\">\n  <\u002Fdiv>\n  <button onclick=\"{{ replay }}\" style=\"position: absolute; right: 18px; bottom: 14px; display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border: 1px solid #c9d3f8; border-radius: 999px; background: #ffffff; color: #4f63b8; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; cursor: pointer; box-shadow: 0 1px 3px rgba(80,99,184,.12);\" style-hover=\"border-color: #88a0f7; color: #3a4fa0;\">\n    <span style=\"display: inline-block; width: 7px; height: 7px; border-radius: 999px; background: #88a0f7;\"><\u002Fspan>\n    Replay\n  <\u002Fbutton>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.wrapRef = React.createRef();\n    this.imgRef = React.createRef();\n    this.edgeRef = React.createRef();\n    this._raf = null;\n    this.duration = 5200; // ms\n  }\n\n  // Piecewise speed: left slow, middle (Burj) faster, right slow.\n  // Each segment: [xStart, xEnd] of the drawing, with a relative speed.\n  segments() {\n    return [\n      { x0: 0.00, x1: 0.40, speed: 1.0 },  // left cluster — slow\n      { x0: 0.40, x1: 0.60, speed: 2.3 },  // Burj Khalifa core — faster\n      { x0: 0.60, x1: 1.00, speed: 1.0 },  // right cluster — slow\n    ];\n  }\n\n  buildTimeline() {\n    const segs = this.segments();\n    let acc = 0;\n    const timed = segs.map(s => {\n      const t = (s.x1 - s.x0) / s.speed; // time cost for this segment\n      const e = { ...s, tStart: acc, tEnd: acc + t };\n      acc += t;\n      return e;\n    });\n    timed.forEach(s => { s.tStart /= acc; s.tEnd /= acc; });\n    return timed;\n  }\n\n  // map normalized time t in [0,1] -> progress x in [0,1]\n  progress(t) {\n    const tl = this._tl || (this._tl = this.buildTimeline());\n    for (const s of tl) {\n      if (t <= s.tEnd) {\n        const k = (t - s.tStart) / (s.tEnd - s.tStart);\n        return s.x0 + (s.x1 - s.x0) * Math.max(0, Math.min(1, k));\n      }\n    }\n    return 1;\n  }\n\n  easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }\n\n  apply(p) {\n    const wrap = this.wrapRef.current, img = this.imgRef.current;\n    if (!wrap || !img) return;\n    const w = wrap.clientWidth || 1;\n    const lead = p * w;\n    const feather = Math.min(60, w * 0.05);\n    const mask = `linear-gradient(to right, #000 ${Math.max(0, lead - feather)}px, transparent ${lead}px)`;\n    img.style.maskImage = mask;\n    img.style.webkitMaskImage = mask;\n  }\n\n  start() {\n    if (this._raf) cancelAnimationFrame(this._raf);\n    const t0 = performance.now();\n    const tick = (now) => {\n      const t = Math.min(1, (now - t0) / this.duration);\n      this.apply(this.progress(this.easeInOut(t)));\n      if (t < 1) this._raf = requestAnimationFrame(tick);\n    };\n    this.apply(0);\n    this._raf = requestAnimationFrame(tick);\n  }\n\n  componentDidMount() {\n    // start once layout/image is ready\n    const img = this.imgRef.current;\n    this.apply(0);\n    if (img && !img.complete) img.addEventListener('load', () => this.start(), { once: true });\n    setTimeout(() => this.start(), 250);\n  }\n\n  componentWillUnmount() { if (this._raf) cancelAnimationFrame(this._raf); }\n\n  renderVals() {\n    return {\n      wrapRef: this.wrapRef,\n      imgRef: this.imgRef,\n      edgeRef: this.edgeRef,\n      replay: () => this.start(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
